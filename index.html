<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>pupupu</title>

<style>
body {
  margin: 0;
  background-color: black;
  overflow: hidden;
}

#square {
  width: 50px;
  height: 50px;
  position: absolute;
  transform: translate(-50%, -50%);
}

#square img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.heart {
  width: 50px;
  height: 50px;
  position: absolute;
  image-rendering: pixelated;
}

/* текст лічильника */
#scoreCounter {
  position: absolute;
  top: 20px;
  right: 20px;
  font-family: "Courier New", monospace;
  font-size: 20px;
  color: #ffffff;
  background: rgba(0, 0, 0, 0.5);
  padding: 8px 12px;
  border-radius: 8px;
}

/* текст історії */
#storyText {
  position: absolute;
  top: 20px;
  left: 20px;
  max-width: 300px;
  font-family: "Courier New", monospace;
  font-size: 18px;
  color: white;
  white-space: pre-line;
}
</style>
</head>

<body>

<div id="square">
  <img id="playerImg" src="saddog.PNG">
</div>

<div id="scoreCounter"></div>
<div id="storyText"></div>

<audio id="bgMusic"></audio>

<script>
const square = document.getElementById("square");
const playerImg = document.getElementById("playerImg");
const music = document.getElementById("bgMusic");
const storyElement = document.getElementById("storyText");
const scoreElement = document.getElementById("scoreCounter");
const hy = Math.random() * (window.innerHeight - 60);

const speed = 20;
const size = 50;

let x = (window.innerWidth - size) / 2;
let y = (window.innerHeight - size) / 2;

square.style.left = x + "px";
square.style.top = y + "px";

const normalImg = "saddog.PNG";
const hitImg = "happydog.PNG";


// =======================
// ЛІЧИЛЬНИК
// =======================
let score = 0;

function updateScore() {
  scoreElement.textContent = score;
}

updateScore();


// =======================
// ТЕКСТ / СЮЖЕТ
// =======================
let isTyping = false;
let stage = 0;

let isFrozen = false;
let drainInterval = null;

function typeText(text, speed = 40) {
  return new Promise(resolve => {
    storyElement.textContent = "";
    let i = 0;
    isTyping = true;

    function typing() {
      if (i < text.length) {
        storyElement.textContent += text[i];
        i++;
        setTimeout(typing, speed);
      } else {
        isTyping = false;
        resolve();
      }
    }

    typing();
  });
}

function eraseText(speed = 20) {
  return new Promise(resolve => {
    let text = storyElement.textContent;

    function erasing() {
      if (text.length > 0) {
        text = text.slice(0, -1);
        storyElement.textContent = text;
        setTimeout(erasing, speed);
      } else {
        resolve();
      }
    }

    erasing();
  });
}

async function updateStory() {
  if (isTyping) return;

  if (score >= 20 && stage < 1) {
    stage = 1;
    await eraseText();
    await typeText("Sometimes love is too much...");
  }

 if (score >= 30 && stage < 2) {
  stage = 2;
   triggerOverloadPhase();
  await eraseText();
  await typeText("Oh...it seems he flopped down from exhaustion, be careful");
  
}

}

async function startStory() {
  await typeText(
    "Look at this poor puppy... without love he gets angry. Help make him happy, but don't overdo it."
  );
}

startStory();


// =======================
// ЗБІР ОБʼЄКТІВ
// =======================
async function triggerOverloadPhase() {
  isFrozen = true;

  // спалах
  const flash = document.createElement("div");
  flash.style.position = "fixed";
  flash.style.top = 0;
  flash.style.left = 0;
  flash.style.width = "100%";
  flash.style.height = "100%";
  flash.style.background = "white";
  flash.style.opacity = "1";
  flash.style.zIndex = "9999";
  document.body.appendChild(flash);

  setTimeout(() => {
    flash.remove();
  }, 300);

  // зміна картинки
  playerImg.src = "tireddog.PNG";

  // зменшення очок
  drainInterval = setInterval(() => {
    if (score > 0) {
      score--;
      updateScore();
    }
  }, 2000);

  // повернення через 13 сек
  setTimeout(() => {
    clearInterval(drainInterval);
    playerImg.src = normalImg;
    isFrozen = false;
  }, 13000);
}

function collectObject() {
  score++;
  updateScore();
  updateStory();
}


// =======================
// РУХ
// =======================
document.addEventListener("keydown", function(event) {

if (isFrozen) return;

  switch(event.key.toLowerCase()) {
    case "arrowup":
    case "w":
      if (y > 0) y -= speed;
      break;

    case "arrowdown":
    case "s":
      if (y < window.innerHeight - size) y += speed;
      break;

    case "arrowleft":
    case "a":
      if (x > 0) x -= speed;
      break;

    case "arrowright":
    case "d":
      if (x < window.innerWidth - size) x += speed;
      break;
  }

  square.style.left = x + "px";
  square.style.top = y + "px";

  checkCollision();
});


// =======================
// СПАВН СЕРДЕЦЬ
// =======================
function spawnHeart() {
  const heart = document.createElement("img");
  heart.src = "heart.PNG";
  heart.classList.add("heart");

  const hx = Math.random() * (window.innerWidth - 50);
  const hy = Math.random() * (window.innerHeight - 50);

  heart.style.left = hx + "px";
  heart.style.top = hy + "px";

  document.body.appendChild(heart);
}

setInterval(spawnHeart, 3500);


// =======================
// КОЛІЗІЯ
// =======================
function checkCollision() {
  const hearts = document.querySelectorAll(".heart");

  hearts.forEach(heart => {
    const hx = heart.offsetLeft;
    const hy = heart.offsetTop;

    if (
      x < hx + 50 &&
      x + 50 > hx &&
      y < hy + 50 &&
      y + 50 > hy
    ) {
      playerImg.src = hitImg;

      setTimeout(() => {
        playerImg.src = normalImg;
      }, 1000);

      heart.remove();
      collectObject();
    }
  });
}


// =======================
// МУЗИКА
// =======================
const playlist = [
  "song1.mp3",
  "song2.mp3",
  "song3.mp3",
  "song4.mp3"
];

let currentTrack = 0;

function playMusic() {
  music.src = playlist[currentTrack];
  music.play();
}

music.addEventListener("ended", () => {
  currentTrack = (currentTrack + 1) % playlist.length;
  playMusic();
});

document.addEventListener("click", () => {
  if (music.paused) {
    music.volume = 0.3;
    playMusic();
  }
});
</script>

</body>
</html>
