<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>pupupu</title>

<style>
body {
  margin: 0;
  background-color: black;
  overflow: hidden;
}

#square {
  width: 50px;
  height: 50px;
  position: absolute;
  transform: translate(-50%, -50%);
}

#square img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.heart {
  width: 50px;
  height: 50px;
  position: absolute;
  image-rendering: pixelated;
}

/* текст лічильника */
#scoreCounter {
  position: absolute;
  top: 20px;
  right: 20px;
  font-family: "Courier New", monospace;
  font-size: 20px;
  color: #ffffff;
  background: rgba(0, 0, 0, 0.5);
  padding: 8px 12px;
  border-radius: 8px;
}

/* текст історії */
#storyText {
  position: absolute;
  top: 20px;
  left: 20px;
  max-width: 300px;
  font-family: "Courier New", monospace;
  font-size: 18px;
  color: white;
  white-space: pre-line;
}
</style>
</head>

<body>

<div id="square">
  <img id="playerImg" src="saddog.PNG">
</div>

<div id="scoreCounter"></div>
<div id="storyText"></div>

<audio id="bgMusic"></audio>

<script>
const square = document.getElementById("square");
const playerImg = document.getElementById("playerImg");
const music = document.getElementById("bgMusic");
const storyElement = document.getElementById("storyText");
const scoreElement = document.getElementById("scoreCounter");

const speed = 20;
const size = 50;

let x = (window.innerWidth - size) / 2;
let y = (window.innerHeight - size) / 2;

square.style.left = x + "px";
square.style.top = y + "px";

const normalImg = "saddog.PNG";
const hitImg = "happydog.PNG";

// =======================
// ЛІЧИЛЬНИК
// =======================
let score = 0;

function updateScore() {
  scoreElement.textContent = score;
}
updateScore();

// =======================
// СТАН
// =======================
let isTyping = false;
let lastSometimes = 0;
let lastOverload = 0;
let isFrozen = false;
let drainInterval = null;

// =======================
// ТЕКСТ
// =======================
function typeText(text, speed = 40) {
  return new Promise(resolve => {
    storyElement.textContent = "";
    let i = 0;
    isTyping = true;

    function typing() {
      if (i < text.length) {
        storyElement.textContent += text[i];
        i++;
        setTimeout(typing, speed);
      } else {
        isTyping = false;
        resolve();
      }
    }
    typing();
  });
}

function eraseText(speed = 20) {
  return new Promise(resolve => {
    let text = storyElement.textContent;

    function erasing() {
      if (text.length > 0) {
        text = text.slice(0, -1);
        storyElement.textContent = text;
        setTimeout(erasing, speed);
      } else {
        resolve();
      }
    }
    erasing();
  });
}

// =======================
// СТАРТ ГРИ
// =======================

async function startStory() {
  await typeText(
    "Look at this poor puppy... without love he gets angry. Help make him happy, but don't overdo it."
  );
}
startStory();

// =======================
// ФАЗИ
// =======================
function collectObject() {
  score++;
  updateScore();
  updateStory();

}

async function updateStory() {
  if (isTyping || isFrozen) return;

 if (score >= 100) return;

  // КОЖНІ 20 ОЧОК → SOMETIMES
  if (score >= lastSometimes + 20) {
    lastSometimes += 20;

    await eraseText();
    await typeText("Sometimes love is too much...");
  }

  // КОЖНІ 30 ОЧОК → ПЕРЕГРУЗКА
  if (score >= lastOverload + 30) {
    lastOverload += 30;

    runPhase2();
  }
}

async function runPhase2() {
  await flashEffect();

  // паралельно
  showPhaseText();
  triggerOverloadPhase();
}

// =======================
// ЕФЕКТИ
// =======================
function flashEffect() {
  return new Promise(resolve => {
    const flash = document.createElement("div");
    flash.style.position = "fixed";
    flash.style.top = 0;
    flash.style.left = 0;
    flash.style.width = "100%";
    flash.style.height = "100%";
    flash.style.background = "white";
    flash.style.zIndex = "9999";

    document.body.appendChild(flash);

    setTimeout(() => {
      flash.remove();
      resolve();
    }, 300);
  });
}

async function showPhaseText() {
    await eraseText();

    await typeText("Oh... it seems he flopped down from exhaustion, be careful");

    // чекаємо 20 секунд
    await new Promise(resolve => setTimeout(resolve, 20000));

    // стираємо текст
    await eraseText();
}

function triggerOverloadPhase() {
  isFrozen = true;

  playerImg.src = "tireddog.PNG";

  drainInterval = setInterval(() => {
    if (score > 0) {
      score--;
      updateScore();
    }
  }, 2000);

  setTimeout(() => {
    clearInterval(drainInterval);
    playerImg.src = normalImg;
    isFrozen = false;
  }, 13000);
}

// =======================
// РУХ
// =======================
document.addEventListener("keydown", function(event) {
  if (isFrozen) return;

  switch(event.key.toLowerCase()) {
    case "arrowup":
    case "w":
      if (y > 0) y -= speed;
      break;
    case "arrowdown":
    case "s":
      if (y < window.innerHeight - size) y += speed;
      break;
    case "arrowleft":
    case "a":
      if (x > 0) x -= speed;
      break;
    case "arrowright":
    case "d":
      if (x < window.innerWidth - size) x += speed;
      break;
  }

  square.style.left = x + "px";
  square.style.top = y + "px";

  checkCollision();
});

// =======================
// СЕРЦЯ
// =======================
function spawnHeart() {
  const heart = document.createElement("img");
  heart.src = "heart.PNG";
  heart.classList.add("heart");

  const hx = Math.random() * (window.innerWidth - 50);
  const hy = Math.random() * (window.innerHeight - 50);

  heart.style.left = hx + "px";
  heart.style.top = hy + "px";

  document.body.appendChild(heart);
}
setInterval(spawnHeart, 3500);

// =======================
// КОЛІЗІЯ
// =======================
function checkCollision() {
  const hearts = document.querySelectorAll(".heart");

  hearts.forEach(heart => {
    const hx = heart.offsetLeft;
    const hy = heart.offsetTop;

    if (
      x < hx + 50 &&
      x + 50 > hx &&
      y < hy + 50 &&
      y + 50 > hy
    ) {
      if (!isFrozen) {
  playerImg.src = hitImg;

  setTimeout(() => {
    if (!isFrozen) {
      playerImg.src = normalImg;
    }
  }, 1000);
}

      heart.remove();
      collectObject();
    }
  });
}

// =======================
// МУЗИКА
// =======================
const playlist = [
  "song1.mp3",
  "song2.mp3",
  "song3.mp3",
  "song4.mp3"
];

let currentTrack = 0;

function playMusic() {
  music.src = playlist[currentTrack];
  music.play();
}

music.addEventListener("ended", () => {
  currentTrack = (currentTrack + 1) % playlist.length;
  playMusic();
});

document.addEventListener("click", () => {
  if (music.paused) {
    music.volume = 0.3;
    playMusic();
  }
});
</script>

</body>
</html>
